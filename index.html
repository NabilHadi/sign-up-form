<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>Sign Up Form</title>
</head>

<body>
  <div class="container">
    <div class="left-side">
      <div class="logo-container">
        <img class="logo-img" src="./resources/odin-lined.png" alt="logo">
        <div class="logo-text">ODIN</div>
      </div>
      <div class="img-credit">
        Photo by <a href="#">Halie West</a> on <a href="#">Unsplash</a>
      </div>
    </div>
    <div class="right-side">
      <p class="form-description">This is not a real online service! You know you need something like this in your life
        to help you realize your deepest dreams.
        Sign up now to get started.
      </p>

      <div class="form-msg">You know you want to</div>
      <form action="">
        <div class="form-container">
          <div class="form-header">Let's do this!</div>
          <div class="input-group">
            <label for="first-name">FIRST NAME</label>
            <input name="first-name" id="first-name" type="text">
          </div>
          <div class="input-group">
            <label for="last-name">LAST NAME</label>
            <input name="last-name" id="last-name" type="text">
          </div>
          <div class="input-group">
            <label for="email">EMAIL</label>
            <input name="email" id="email" type="email">
          </div>
          <div class="input-group">
            <label for="phone-number">PHONE NUMBER</label>
            <input name="phone-number" id="phone-number" type="text">
          </div>
          <div class="input-group">
            <label for="password">PASSWORD</label>
            <input name="password" id="password" type="text">
          </div>
          <div class="input-group">
            <label for="conf-password">CONFIRM PASSWORD</label>
            <input name="conf-password" id="conf-password" type="text">
          </div>
        </div>
        <button type="submit">Create Account</button>
      </form>
      <div class="login-text">
        Already have an account? <a href="#">Log in</a>
      </div>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>

</html>
